<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FIRAS</title>

<style>
body {
  margin: 0;
  min-height: 100vh;
  font-family: Arial, sans-serif;
  overflow: hidden;
  color: white;
  cursor: none;
  text-align: center;
  background: #000;
}

/* 🌈 background */
.bg {
  position: fixed;
  inset: 0;
  background: linear-gradient(-45deg,#0f0c29,#302b63,#24243e,#000);
  background-size: 400% 400%;
  animation: moveBG 10s ease infinite;
  z-index: -3;
}

@keyframes moveBG {
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* 🌌 stars */
.star-bg {
  position: fixed;
  inset: 0;
  z-index: -2;
}

.bg-star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  opacity: 0.6;
  border-radius: 50%;
  animation: twinkle 3s infinite ease-in-out;
}

@keyframes twinkle {
  0%,100% { opacity: 0.2; }
  50% { opacity: 1; }
}

/* 💎 layout */
.container {
  position: relative;
  z-index: 2;
  padding-top: 40px;
}

/* 🔥 title */
.title {
  font-size: 70px;
  letter-spacing: 14px;
  background: linear-gradient(90deg,#00f7ff,#5865F2,#fff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* 💎 card */
.card {
  margin-top: 25px;
  padding: 35px;
  border-radius: 20px;
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(15px);
  display: inline-block;
}

/* 🔘 buttons */
button {
  margin: 10px;
  padding: 12px 18px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  background: linear-gradient(90deg,#5865F2,#00f7ff);
  color: white;
  font-weight: bold;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.1);
  box-shadow: 0 0 20px #00f7ff;
}

/* 🎧 slider FIX */
input[type="range"] {
  width: 100%;
  cursor: pointer;
}

/* 🖱️ trail */
.trail {
  position: absolute;
  width: 8px;
  height: 8px;
  background: #00f7ff;
  border-radius: 50%;
  pointer-events: none;
  animation: fade 0.7s linear forwards;
  box-shadow: 0 0 15px #00f7ff;
}

@keyframes fade {
  0% { transform: scale(1); opacity: 1; }
  100% { transform: scale(0); opacity: 0; }
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="star-bg" id="bg"></div>

<div class="container">
  <div class="title">FIRAS</div>

  <div class="card">

    <button onclick="openDiscord()">Discord</button>
    <button onclick="openKick()">Kick</button>

    <hr>

    <div id="songName">FIRAS MUSIC</div>

    <button onclick="toggleMusic()">▶ / ⏸</button>

    <br><br>

    🔊 <input type="range" min="0" max="1" step="0.01" value="0.5" oninput="setVolume(this.value)">
  </div>
</div>

<audio id="music"></audio>

<script>

/* 🌌 stars */
const bg = document.getElementById("bg");

for (let i = 0; i < 100; i++) {
  let s = document.createElement("div");
  s.className = "bg-star";
  s.style.left = Math.random() * 100 + "vw";
  s.style.top = Math.random() * 100 + "vh";
  bg.appendChild(s);
}

/* 🖱️ trail */
document.addEventListener("mousemove", (e) => {
  let t = document.createElement("div");
  t.className = "trail";
  t.style.left = e.clientX + "px";
  t.style.top = e.clientY + "px";
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 700);
});

/* 🔗 links */
function openDiscord() {
  window.open("https://discord.com/users/1350859677470163026");
}

function openKick() {
  window.open("https://kick.com/FIRAS_RAHALI");
}

/* 🎧 MUSIC FIXED */
let music = document.getElementById("music");
music.volume = 0.5;

let song = {
  name: "FIRAS MUSIC",
  file: "music.mp3"
};

function loadSong() {
  music.src = song.file;
  music.load();
  document.getElementById("songName").innerText = song.name;
}

function toggleMusic() {
  if (!music.src) loadSong();

  if (music.paused) {
    music.play().catch(()=>alert("اضغط مرة أخرى 🔊"));
  } else {
    music.pause();
  }
}

/* 🔊 volume */
function setVolume(v) {
  music.volume = parseFloat(v);
}

</script>

</body>
</html>
