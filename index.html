<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FIRAS</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0a0a0a;
  overflow: hidden;
  color: white;
  text-align: center;
  cursor: none;
}

/* ===== floating stars background ===== */
.star-bg {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: 0;
}

.bg-star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  opacity: 0.5;
  border-radius: 50%;
}

/* ===== mouse trail stars ===== */
.trail {
  position: absolute;
  width: 6px;
  height: 6px;
  background: white;
  border-radius: 50%;
  pointer-events: none;
  animation: fade 0.8s linear forwards;
  box-shadow: 0 0 10px white;
}

@keyframes fade {
  0% { transform: scale(1); opacity: 1; }
  100% { transform: scale(0); opacity: 0; }
}

/* ===== content ===== */
.title {
  margin-top: 70px;
  font-size: 70px;
  letter-spacing: 12px;
  font-weight: bold;
  animation: float 3s ease-in-out infinite;
  position: relative;
  z-index: 2;
}

@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-12px); }
  100% { transform: translateY(0px); }
}

.card {
  margin-top: 50px;
  display: inline-block;
  padding: 30px;
  background: rgba(255,255,255,0.06);
  border-radius: 18px;
  backdrop-filter: blur(12px);
  min-width: 320px;
  position: relative;
  z-index: 2;
}

.kick {
  font-size: 26px;
  color: #5865F2;
  animation: pulse 1.5s infinite;
  margin-bottom: 10px;
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.08); }
  100% { transform: scale(1); }
}

.discord {
  font-size: 20px;
  color: #00c6ff;
  margin-bottom: 15px;
}

.name {
  font-size: 18px;
  color: #aaa;
  letter-spacing: 2px;
}
</style>
</head>

<body>

<div class="star-bg" id="bg"></div>

<div class="title">FIRAS</div>

<div class="card">
  <div class="kick">KICK</div>
  <div class="discord">DISCORD</div>
  <div class="name">FIRAS_RAHALI</div>
</div>

<script>
/* ===== background stars ===== */
const bg = document.getElementById("bg");

for (let i = 0; i < 100; i++) {
  let s = document.createElement("div");
  s.className = "bg-star";
  s.style.left = Math.random() * 100 + "vw";
  s.style.top = Math.random() * 100 + "vh";
  bg.appendChild(s);
}

/* ===== mouse trail effect ===== */
document.addEventListener("mousemove", (e) => {
  let star = document.createElement("div");
  star.className = "trail";

  star.style.left = e.clientX + "px";
  star.style.top = e.clientY + "px";

  document.body.appendChild(star);

  setTimeout(() => {
    star.remove();
  }, 800);
});
</script>

</body>
</html>
