<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FIRAS</title>

<style>
body{
  margin:0;
  font-family:Arial;
  overflow:hidden;
  cursor:none;
  color:white;
  background:#000;
}

/* 🌌 background */
.bg{
  position:fixed;
  inset:0;
  background:linear-gradient(-45deg,#0f0c29,#302b63,#24243e,#000);
  background-size:400% 400%;
  animation:move 10s infinite;
  z-index:-3;
}

@keyframes move{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* ✨ stars */
.star{
  position:fixed;
  inset:0;
  z-index:-2;
}

.dot{
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  border-radius:50%;
  animation:tw 3s infinite;
}

@keyframes tw{
  0%,100%{opacity:.2}
  50%{opacity:1}
}

/* 🌟 INTRO */
.intro{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.title{
  font-size:70px;
  background:linear-gradient(90deg,#00f7ff,#5865F2,#fff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.sub{
  margin-top:10px;
  opacity:0.7;
}

/* 🔘 button */
.btn{
  margin-top:25px;
  padding:15px 25px;
  border:none;
  border-radius:20px;
  background:linear-gradient(90deg,#00f7ff,#5865F2);
  color:white;
  cursor:pointer;
  font-weight:bold;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.1);
}

/* 💎 MAIN */
.main{
  display:none;
  padding:40px;
}

/* layout */
.top-right{
  position:absolute;
  top:20px;
  right:20px;
  padding:15px;
  background:rgba(255,255,255,0.05);
  border-radius:15px;
  backdrop-filter:blur(10px);
}

.center{
  text-align:center;
  margin-top:80px;
}

.card{
  margin:20px auto;
  padding:25px;
  width:300px;
  background:rgba(255,255,255,0.06);
  border-radius:20px;
  backdrop-filter:blur(15px);
}

.right{
  position:absolute;
  right:20px;
  top:200px;
}

button{
  margin:8px;
  padding:10px 15px;
  border:none;
  border-radius:12px;
  background:linear-gradient(90deg,#5865F2,#00f7ff);
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="star" id="star"></div>

<!-- 🌟 INTRO -->
<div class="intro" id="intro">
  <div class="title">FIRAS</div>
  <div class="sub">WELCOME TO MY SITEWEB</div>
  <button class="btn" onclick="enter()">CONTINUE</button>
</div>

<!-- 💎 MAIN -->
<div class="main" id="main">

  <!-- DEV -->
  <div class="top-right">
    👨‍💻 DEV FiveM
  </div>

  <!-- CENTER -->
  <div class="center">
    <h2>FIRAS</h2>

    <div class="card">
      👤 PROFILE
      <br><br>
      <button onclick="openKick()">Kick</button>
      <button onclick="openDiscord()">Discord</button>
    </div>
  </div>

  <!-- DISCORD SERVER -->
  <div class="center">
    <div class="card">
      💬 WELCOME TO MY DISCORD SERVER
      <br><br>
      <button onclick="window.open('https://discord.gg/EPMaJW3p')">
        JOIN SERVER
      </button>
    </div>
  </div>

  <!-- RIGHT INFO -->
  <div class="right">
    <div class="card">
      <b>مشروعي:</b><br>
      هذا مشروع شخصي متاعي نطوّرو فيه برشا حاجات:<br>
      مواقع، تصميم، و تجارب جديدة 💻🔥
      <br><br>
      <b>ملاحظة:</b><br>
      تواصل معايا عادي لأي حاجة 🤝
    </div>
  </div>

</div>

<script>

/* 🌌 stars */
const star=document.getElementById("star");

for(let i=0;i<80;i++){
  let d=document.createElement("div");
  d.className="dot";
  d.style.left=Math.random()*100+"vw";
  d.style.top=Math.random()*100+"vh";
  star.appendChild(d);
}

/* 🚀 continue */
function enter(){
  document.getElementById("intro").style.display="none";
  document.getElementById("main").style.display="block";
}

/* 🔗 links */
function openDiscord(){
  window.open("https://discord.com/users/1350859677470163026");
}

function openKick(){
  window.open("https://kick.com/FIRAS_RAHALI");
}

</script>

</body>
</html>
