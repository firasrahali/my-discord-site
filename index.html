<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FIRAS</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  overflow: hidden;
  color: white;
  text-align: center;
  cursor: none;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* 🌌 stars background */
.star-bg {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: 0;
}

.bg-star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  opacity: 0.6;
  border-radius: 50%;
  animation: twinkle 3s infinite ease-in-out;
}

@keyframes twinkle {
  0%,100% { opacity: 0.2; }
  50% { opacity: 1; }
}

/* ✨ mouse trail */
.trail {
  position: absolute;
  width: 6px;
  height: 6px;
  background: #00f7ff;
  border-radius: 50%;
  pointer-events: none;
  animation: fade 0.8s linear forwards;
  box-shadow: 0 0 12px #00f7ff;
}

@keyframes fade {
  0% { transform: scale(1); opacity: 1; }
  100% { transform: scale(0); opacity: 0; }
}

/* 🔥 title */
.title {
  font-size: 75px;
  letter-spacing: 14px;
  font-weight: bold;
  background: linear-gradient(90deg,#00f7ff,#5865F2,#fff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: float 3s ease-in-out infinite;
  margin-bottom: 20px;
}

@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-15px); }
  100% { transform: translateY(0px); }
}

/* 💎 card */
.card {
  padding: 35px;
  border-radius: 20px;
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(15px);
  min-width: 340px;
  border: 1px solid rgba(255,255,255,0.1);
  transition: 0.4s;
  z-index: 2;
}

.card:hover {
  transform: scale(1.06);
  box-shadow: 0 0 50px #00f7ff;
  border: 1px solid #00f7ff;
}

/* 🎮 texts */
.kick {
  font-size: 26px;
  color: #5865F2;
  font-weight: bold;
  text-shadow: 0 0 10px #5865F2;
}

.discord {
  font-size: 18px;
  color: #00c6ff;
  margin-top: 10px;
}

.name {
  font-size: 16px;
  color: #aaa;
  letter-spacing: 2px;
}

/* 🔘 buttons */
button {
  margin: 10px;
  padding: 12px 18px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  background: linear-gradient(90deg,#5865F2,#00f7ff);
  color: white;
  font-weight: bold;
  transition: 0.3s;
}

button:hover {
  transform: translateY(-3px);
  box-shadow: 0 0 20px #00f7ff;
}
</style>
</head>

<body>

<div class="star-bg" id="bg"></div>

<div>
  <div class="title">FIRAS</div>

  <div class="card">
    <div class="kick">KICK</div>
    <div class="discord">Discord ID: 1350859677470163026</div>
    <div class="name">FIRAS_RAHALI</div>

    <br>

    <button onclick="openDiscord()">Open Discord</button>
    <button onclick="openKick()">Open Kick</button>
  </div>
</div>

<script>
/* stars */
const bg = document.getElementById("bg");

for (let i = 0; i < 120; i++) {
  let s = document.createElement("div");
  s.className = "bg-star";
  s.style.left = Math.random() * 100 + "vw";
  s.style.top = Math.random() * 100 + "vh";
  bg.appendChild(s);
}

/* mouse trail */
document.addEventListener("mousemove", (e) => {
  let star = document.createElement("div");
  star.className = "trail";

  star.style.left = e.clientX + "px";
  star.style.top = e.clientY + "px";

  document.body.appendChild(star);

  setTimeout(() => star.remove(), 800);
});

/* buttons */
function openDiscord() {
  window.open("https://discord.com/users/1350859677470163026", "_blank");
}

function openKick() {
  window.open("https://kick.com/FIRAS_RAHALI", "_blank");
}
</script>

</body>
</html>
