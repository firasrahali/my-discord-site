<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FIRAS ULTRA PRO</title>

<style>
body{
  margin:0;
  font-family:Arial;
  overflow:hidden;
  color:white;
  background:#000;
}

/* 🌌 background */
.bg{
  position:fixed;
  inset:0;
  background:linear-gradient(-45deg,#0f0c29,#302b63,#24243e,#000);
  background-size:400% 400%;
  animation:bg 10s infinite;
  z-index:-2;
}

@keyframes bg{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* 🌟 intro */
.intro{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.title{
  font-size:80px;
  background:linear-gradient(90deg,#00f7ff,#5865F2,#fff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:float 3s infinite;
}

@keyframes float{
  0%{transform:translateY(0)}
  50%{transform:translateY(-15px)}
  100%{transform:translateY(0)}
}

.btn{
  margin-top:30px;
  padding:15px 30px;
  border:none;
  border-radius:25px;
  background:linear-gradient(90deg,#00f7ff,#5865F2);
  color:white;
  cursor:pointer;
  font-size:18px;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.1);
  box-shadow:0 0 30px #00f7ff;
}

/* 💎 main */
.main{
  display:none;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
  animation:fadeIn 1s;
}

@keyframes fadeIn{
  from{opacity:0;transform:scale(0.9)}
  to{opacity:1;transform:scale(1)}
}

/* card */
.card{
  padding:30px;
  width:350px;
  background:rgba(255,255,255,0.06);
  border-radius:25px;
  backdrop-filter:blur(15px);
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 0 40px rgba(0,255,255,0.2);
  margin-bottom:20px;
}

/* arabic text */
.ar{
  font-size:18px;
  line-height:1.8;
  direction:rtl;
}

/* buttons */
button{
  margin-top:15px;
  padding:12px 20px;
  border:none;
  border-radius:15px;
  background:linear-gradient(90deg,#5865F2,#00f7ff);
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="bg"></div>

<!-- INTRO -->
<div class="intro" id="intro">
  <div class="title">FIRAS</div>
  <button class="btn" onclick="enter()">CONTINUE</button>
</div>

<!-- MAIN -->
<div class="main" id="main">

  <!-- TEXT CARD -->
  <div class="card ar">
    👨‍💻 Developer FiveM<br><br>
    كان تحتاج Developer، كلّمني على Discord 🤝
  </div>

  <!-- DISCORD -->
  <div class="card">
    <iframe 
      src="https://discord.com/widget?id=1471603948992594003&theme=dark"
      width="300"
      height="400"
      frameborder="0">
    </iframe>

    <br>

    <button onclick="openDiscord()">My Discord</button>
  </div>

</div>

<script>

function enter(){
  document.getElementById("intro").style.display="none";
  document.getElementById("main").style.display="flex";
}

function openDiscord(){
  window.open("https://discord.com/users/1350859677470163026","_blank");
}

</script>

</body>
</html>
