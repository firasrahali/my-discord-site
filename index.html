<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FIRAS SITE</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  overflow: hidden;
  color: white;
  cursor: none;
  background: black;
}

/* 🌈 background */
.bg {
  position: fixed;
  inset: 0;
  background: linear-gradient(-45deg,#0f0c29,#302b63,#24243e,#000);
  background-size: 400% 400%;
  animation: bg 10s infinite;
  z-index: -3;
}

@keyframes bg {
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* 🌌 stars */
.star {
  position: fixed;
  inset: 0;
  z-index: -2;
}

.dot {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  border-radius: 50%;
  animation: tw 3s infinite;
}

@keyframes tw {
  0%,100%{opacity:.2}
  50%{opacity:1}
}

/* 💎 intro */
.intro {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.title {
  font-size: 70px;
  background: linear-gradient(90deg,#00f7ff,#5865F2,#fff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: float 3s infinite;
}

@keyframes float {
  0%{transform:translateY(0)}
  50%{transform:translateY(-15px)}
  100%{transform:translateY(0)}
}

.sub {
  opacity: 0.7;
  letter-spacing: 3px;
}

.btn {
  margin-top: 20px;
  padding: 15px 25px;
  border: none;
  border-radius: 20px;
  background: linear-gradient(90deg,#00f7ff,#5865F2);
  cursor: pointer;
  color: white;
  font-weight: bold;
}

/* 💎 main page */
.main {
  display: none;
  padding-top: 50px;
  text-align: center;
}

.card {
  margin: 20px auto;
  padding: 30px;
  width: 350px;
  border-radius: 20px;
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.1);
}

button {
  margin: 8px;
  padding: 10px 15px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(90deg,#5865F2,#00f7ff);
  color: white;
  cursor: pointer;
}

input {
  width: 100%;
}

/* 🖱️ mouse */
.cursor {
  position: absolute;
  width: 10px;
  height: 10px;
  background: #00f7ff;
  border-radius: 50%;
  pointer-events: none;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="star" id="star"></div>

<!-- 🌟 INTRO -->
<div class="intro" id="intro">
  <div class="title">FIRAS</div>
  <div class="sub">WELCOME TO MY SITEWEB</div>
  <button class="btn" onclick="enter()">CONTINUE</button>
</div>

<!-- 💎 MAIN -->
<div class="main" id="main">

  <h2>👤 FIRAS</h2>

  <div class="card">
    <button onclick="openKick()">Kick</button>
    <button onclick="openDiscord()">Discord</button>
  </div>

  <div class="card">
    <h3>👨‍💻 DEV FiveM</h3>
  </div>

  <div class="card">
    <h3>WELCOME TO MY DISCORD SERVER</h3>
    <button onclick="window.open('https://discord.gg/EPMaJW3p')">JOIN</button>
  </div>

</div>

<script>

/* 🌌 stars */
const star = document.getElementById("star");

for(let i=0;i<80;i++){
  let d=document.createElement("div");
  d.className="dot";
  d.style.left=Math.random()*100+"vw";
  d.style.top=Math.random()*100+"vh";
  star.appendChild(d);
}

/* 🚀 enter site */
function enter(){
  document.getElementById("intro").style.display="none";
  document.getElementById("main").style.display="block";
}

/* 🔗 links */
function openDiscord(){
  window.open("https://discord.com/users/1350859677470163026");
}

function openKick(){
  window.open("https://kick.com/FIRAS_RAHALI");
}

/* 🖱️ mouse effect */
document.addEventListener("mousemove",(e)=>{
  let c=document.createElement("div");
  c.className="cursor";
  c.style.left=e.clientX+"px";
  c.style.top=e.clientY+"px";
  document.body.appendChild(c);
  setTimeout(()=>c.remove(),300);
});

</script>

</body>
</html>
