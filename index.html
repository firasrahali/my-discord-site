<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FIRAS</title>

<style>
body {
  margin: 0;
  min-height: 100vh;
  font-family: Arial, sans-serif;
  overflow: hidden;
  color: white;
  cursor: none;
  text-align: center;
  background: #000;
}

/* 🌈 animated background */
.bg {
  position: fixed;
  inset: 0;
  background: linear-gradient(-45deg,#0f0c29,#302b63,#24243e,#000);
  background-size: 400% 400%;
  animation: moveBG 10s ease infinite;
  z-index: -3;
}

@keyframes moveBG {
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* 🌌 stars */
.star-bg {
  position: fixed;
  inset: 0;
  z-index: -2;
}

.bg-star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  opacity: 0.6;
  border-radius: 50%;
  animation: twinkle 3s infinite ease-in-out;
}

@keyframes twinkle {
  0%,100% { opacity: 0.2; }
  50% { opacity: 1; }
}

/* 💎 container */
.container {
  position: relative;
  z-index: 2;
  padding-top: 40px;
}

/* 🔥 title */
.title {
  font-size: 70px;
  font-weight: bold;
  letter-spacing: 14px;
  background: linear-gradient(90deg,#00f7ff,#5865F2,#fff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-15px); }
  100% { transform: translateY(0px); }
}

/* 💎 card */
.card {
  margin-top: 25px;
  padding: 35px;
  border-radius: 20px;
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(15px);
  min-width: 340px;
  display: inline-block;
  border: 1px solid rgba(255,255,255,0.1);
  transition: 0.4s;
}

.card:hover {
  transform: scale(1.06);
  box-shadow: 0 0 50px #00f7ff;
  border: 1px solid #00f7ff;
}

/* 🎮 texts */
.kick {
  font-size: 26px;
  color: #5865F2;
  font-weight: bold;
}

.discord {
  font-size: 18px;
  color: #00c6ff;
  margin-top: 8px;
}

.name {
  font-size: 16px;
  color: #aaa;
  letter-spacing: 2px;
}

/* 🔘 buttons */
button {
  margin: 10px;
  padding: 12px 18px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  background: linear-gradient(90deg,#5865F2,#00f7ff);
  color: white;
  font-weight: bold;
  transition: 0.3s;
}

button:hover {
  transform: translateY(-3px);
  box-shadow: 0 0 20px #00f7ff;
}

/* 🎵 music */
.music {
  margin-top: 15px;
}

#songName {
  margin: 10px 0;
  color: #00f7ff;
  font-weight: bold;
}

input[type="range"] {
  width: 100%;
}

/* 🖱️ trail */
.trail {
  position: absolute;
  width: 6px;
  height: 6px;
  background: #00f7ff;
  border-radius: 50%;
  pointer-events: none;
  animation: fade 0.8s linear forwards;
  box-shadow: 0 0 12px #00f7ff;
}

@keyframes fade {
  0% { transform: scale(1); opacity: 1; }
  100% { transform: scale(0); opacity: 0; }
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="star-bg" id="bg"></div>

<div class="container">

  <div class="title">FIRAS</div>

  <div class="card">
    <div class="kick">KICK</div>
    <div class="discord">Discord ID: 1350859677470163026</div>
    <div class="name">FIRAS_RAHALI</div>

    <br>

    <button onclick="openDiscord()">Discord</button>
    <button onclick="openKick()">Kick</button>

    <hr>

    <!-- 🎵 MUSIC -->
    <div class="music">
      <div id="songName">Alan Walker - Spectre</div>

      <button onclick="prevSong()">⬅</button>
      <button onclick="toggleMusic()">▶ / ⏸</button>
      <button onclick="nextSong()">➡</button>

      <br>

      🔊 <input type="range" min="0" max="1" step="0.01" value="0.5" oninput="setVolume(this.value)">
    </div>
  </div>

</div>

<!-- 🎧 audio -->
<audio id="music"></audio>

<script>

/* 🌌 stars */
const bg = document.getElementById("bg");
for (let i = 0; i < 120; i++) {
  let s = document.createElement("div");
  s.className = "bg-star";
  s.style.left = Math.random() * 100 + "vw";
  s.style.top = Math.random() * 100 + "vh";
  bg.appendChild(s);
}

/* 🖱️ trail */
document.addEventListener("mousemove", (e) => {
  let t = document.createElement("div");
  t.className = "trail";
  t.style.left = e.clientX + "px";
  t.style.top = e.clientY + "px";
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 800);
});

/* 🔗 links */
function openDiscord() {
  window.open("https://discord.com/users/1350859677470163026", "_blank");
}

function openKick() {
  window.open("https://kick.com/FIRAS_RAHALI", "_blank");
}

/* 🎵 music */
let songs = [
  { name: "Alan Walker - Spectre", file: "music.mp3" },
  { name: "TheFatRat - Xenogenesis", file: "music2.mp3" }
];

let index = 0;
let music = document.getElementById("music");

/* 🔥 volume initial */
music.volume = 0.5;

function loadSong() {
  music.src = songs[index].file;
  document.getElementById("songName").innerText = songs[index].name;
}

function toggleMusic() {
  if (!music.src) loadSong();

  if (music.paused) {
    music.play().catch(() => {
      alert("اضغط مرة أخرى 🔊");
    });
  } else {
    music.pause();
  }
}

function nextSong() {
  index = (index + 1) % songs.length;
  loadSong();
  music.play();
}

function prevSong() {
  index = (index - 1 + songs.length) % songs.length;
  loadSong();
  music.play();
}

function setVolume(v) {
  music.volume = parseFloat(v);
}

</script>

</body>
</html>
