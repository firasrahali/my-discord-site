<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FIRAS</title>

<style>
body{
  margin:0;
  font-family:Arial;
  overflow-x:hidden;
  color:white;
  background:#000;
}

/* background */
.bg{
  position:fixed;
  inset:0;
  background:linear-gradient(-45deg,#0f0c29,#302b63,#24243e,#000);
  background-size:400% 400%;
  animation:move 10s infinite;
  z-index:-3;
}

@keyframes move{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* intro */
.intro{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.title{
  font-size:70px;
  background:linear-gradient(90deg,#00f7ff,#5865F2,#fff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.sub{
  margin-top:10px;
  opacity:0.7;
}

/* button */
.btn{
  margin-top:25px;
  padding:15px 25px;
  border:none;
  border-radius:20px;
  background:linear-gradient(90deg,#00f7ff,#5865F2);
  color:white;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.1);
}

/* main */
.main{
  display:none;
  padding:40px;
  text-align:center;
}

/* cards */
.card{
  margin:20px auto;
  padding:25px;
  width:320px;
  background:rgba(255,255,255,0.06);
  border-radius:20px;
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.1);
}

/* buttons */
button{
  margin:8px;
  padding:10px 15px;
  border:none;
  border-radius:12px;
  background:linear-gradient(90deg,#5865F2,#00f7ff);
  color:white;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:translateY(-3px);
}

/* discord iframe fix */
iframe{
  border-radius:12px;
}
</style>
</head>

<body>

<div class="bg"></div>

<!-- INTRO -->
<div class="intro" id="intro">
  <div class="title">FIRAS</div>
  <div class="sub">WELCOME TO MY SITEWEB</div>

  <button class="btn" onclick="enter()">CONTINUE</button>
</div>

<!-- MAIN -->
<div class="main" id="main">

  <!-- PROFILE -->
  <div class="card">
    👤 PROFILE
    <br><br>

    <button onclick="openDiscord()">Discord</button>
  </div>

  <!-- DISCORD SERVER -->
  <div class="card">
    💬 DISCORD SERVER

    <br><br>

    <iframe 
      src="https://discord.com/widget?id=1471603948992594003&theme=dark"
      width="300"
      height="400">
    </iframe>

  </div>

</div>

<script>

/* enter */
function enter(){
  document.getElementById("intro").style.display="none";
  document.getElementById("main").style.display="block";
}

/* discord profile */
function openDiscord(){
  window.open("https://discord.com/users/1350859677470163026","_blank");
}

</script>

</body>
</html>
